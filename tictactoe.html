<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      height: 1.5em;
      color: #a0c4ff;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 120px);
      grid-template-rows: repeat(3, 120px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.04);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a0c4ff; }

    .cell.win {
      background: #0f3460;
      box-shadow: 0 0 16px 4px rgba(160, 196, 255, 0.4);
    }

    #restart {
      margin-top: 1.8rem;
      padding: 0.6rem 2rem;
      font-size: 1rem;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s;
    }

    #restart:hover { background: #c73652; }

    #scores {
      display: flex;
      gap: 2rem;
      margin-bottom: 1.2rem;
      font-size: 1rem;
    }

    .score-box {
      text-align: center;
      background: #16213e;
      padding: 0.4rem 1.2rem;
      border-radius: 8px;
    }

    .score-box .label { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
    .score-box .value { font-size: 1.5rem; font-weight: bold; }
    .score-box.x .value { color: #e94560; }
    .score-box.o .value { color: #a0c4ff; }
    .score-box.draws .value { color: #aaa; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>

  <div id="scores">
    <div class="score-box x">
      <div class="label">X</div>
      <div class="value" id="score-x">0</div>
    </div>
    <div class="score-box draws">
      <div class="label">Draws</div>
      <div class="value" id="score-draws">0</div>
    </div>
    <div class="score-box o">
      <div class="label">O</div>
      <div class="value" id="score-o">0</div>
    </div>
  </div>

  <div id="status">X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <button id="restart">Restart</button>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8], // rows
      [0,3,6],[1,4,7],[2,5,8], // cols
      [0,4,8],[2,4,6]          // diagonals
    ];

    let board, current, gameOver, scores;

    function init() {
      board = Array(9).fill(null);
      current = 'X';
      gameOver = false;
      scores = scores || { X: 0, O: 0, draws: 0 };
      render();
    }

    function render() {
      document.querySelectorAll('.cell').forEach(cell => {
        const i = +cell.dataset.i;
        const val = board[i];
        cell.textContent = val || '';
        cell.className = 'cell' + (val ? ` ${val.toLowerCase()} taken` : '');
      });
      document.getElementById('score-x').textContent = scores.X;
      document.getElementById('score-o').textContent = scores.O;
      document.getElementById('score-draws').textContent = scores.draws;
    }

    function checkWinner() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return { winner: board[a], line: [a, b, c] };
        }
      }
      if (board.every(Boolean)) return { winner: null, line: [] };
      return null;
    }

    function handleClick(e) {
      const cell = e.target.closest('.cell');
      if (!cell || gameOver) return;
      const i = +cell.dataset.i;
      if (board[i]) return;

      board[i] = current;
      render();

      const result = checkWinner();
      if (result !== null) {
        gameOver = true;
        if (result.winner) {
          scores[result.winner]++;
          result.line.forEach(i => document.querySelector(`[data-i="${i}"]`).classList.add('win'));
          document.getElementById('status').textContent = `${result.winner} wins!`;
        } else {
          scores.draws++;
          document.getElementById('status').textContent = "It's a draw!";
        }
        render();
        return;
      }

      current = current === 'X' ? 'O' : 'X';
      document.getElementById('status').textContent = `${current}'s turn`;
    }

    document.getElementById('board').addEventListener('click', handleClick);
    document.getElementById('restart').addEventListener('click', () => {
      document.getElementById('status').textContent = "X's turn";
      init();
    });

    init();
  </script>
</body>
</html>
